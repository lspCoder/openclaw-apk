name: Build OpenClaw APK

on:
  push:
    branches: [main]
    paths:
      - 'projects/openclaw-apk/**'
  pull_request:
    branches: [main]
    paths:
      - 'projects/openclaw-apk/**'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Run with debug logging'
        required: false
        default: 'false'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: projects/openclaw-apk

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Build debug APK
        run: |
          cd projects/openclaw-apk
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Build release APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd projects/openclaw-apk
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-apk-debug
          path: projects/openclaw-apk/app/build/outputs/apk/debug/

      - name: Upload release APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-apk-release
          path: projects/openclaw-apk/app/build/outputs/apk/release/

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'ci skip')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            projects/openclaw-apk/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Notify on failure
        if: needs.build.result == 'failure'
        run: |
          echo "Build failed! Check the workflow logs for details."
          # Add Discord/other notification here if needed
